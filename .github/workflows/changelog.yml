name: Generate Changelog

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      from_tag:
        description: 'From tag (optional)'
        required: false
      to_tag:
        description: 'To tag (optional, defaults to HEAD)'
        required: false

permissions:
  contents: write

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version || '0.0.0'")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        run: |
          node .github/scripts/generate-changelog.js

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add CHANGELOG.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: update CHANGELOG.md [skip ci]"
          git push
